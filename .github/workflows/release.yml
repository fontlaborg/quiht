name: Release

# Tag-driven release. Pushing a semver tag (e.g. v1.2.3) builds every package,
# runs the tests, then publishes quiht-tools to PyPI and quiht-core +
# quiht-l10n-vu to npm — all versioned from the tag, matching publish.sh.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  id-token: write # PyPI + npm trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs reads the tag from full history

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: astral-sh/setup-uv@v5

      # --- Build + test the TypeScript packages -----------------------------
      - name: quiht-core — build + test
        working-directory: quiht-core
        run: npm install && npm run build && npm test

      - name: quiht-l10n-vu — build + test
        working-directory: quiht-l10n-vu
        run: npm install && npm run build && npm test

      # --- Python: quiht-tools -> PyPI (trusted publishing) -----------------
      - name: quiht-tools — build
        working-directory: quiht-tools
        run: uvx hatch clean && uv build

      - name: quiht-tools — publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: quiht-tools/dist

      # --- npm: stamp version from tag, then publish ------------------------
      # quiht-l10n-vu depends on quiht-core; rewrite its file: dep to the
      # published semver so the npm package resolves the registry version.
      - name: Stamp package versions from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - "$VERSION" <<'NODE'
          const fs = require("node:fs");
          const version = process.argv[2];
          const stamp = (path, rewriteCore) => {
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.version = version;
            if (rewriteCore && pkg.dependencies?.["quiht-core"]) {
              pkg.dependencies["quiht-core"] = `^${version}`;
            }
            fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          };
          stamp("quiht-core/package.json", false);
          stamp("quiht-l10n-vu/package.json", true);
          NODE

      - name: quiht-core — publish to npm
        working-directory: quiht-core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: quiht-l10n-vu — publish to npm
        working-directory: quiht-l10n-vu
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
