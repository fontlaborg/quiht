<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quiht — Qt .ui → HTML renderer</title>
  <meta name="description" content="Drag and drop a Qt .ui, .quiht.json, or .quiht.zip and see it rendered as HTML/CSS in your browser.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a84ff'/%3E%3Ctext x='16' y='22' font-family='Helvetica,Arial' font-size='16' font-weight='700' fill='white' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
  <script type="module" crossorigin src="./assets/index-DjDPwdo7.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DzDz-FtN.css">
</head>
<body>
  <header class="hero">
    <div class="brand">
      <span class="brand-mark">QUIHT</span>
      <span class="brand-sub">Qt&nbsp;.ui&nbsp;→&nbsp;HTML renderer</span>
    </div>
    <button id="theme-toggle" class="ghost-btn" type="button" aria-label="Toggle theme">◐ Theme</button>
  </header>

  <main class="page">
    <div id="stage-container" class="stage-container">
      <div id="stage" class="stage" tabindex="0" role="button"
           aria-label="Gridded canvas. Drag and drop a file here, or click to browse.">
        <div id="stage-placeholder" class="stage-placeholder">
          <div class="placeholder-icon">⤓</div>
          <p class="placeholder-title">Drop a file here</p>
          <p class="placeholder-hint">.ui · .quiht.json · .quiht.zip &nbsp;—&nbsp; or click to browse</p>
        </div>
        <div id="render-root" class="render-root" hidden></div>
      </div>
      <input type="file" id="file-input" accept=".ui,.xml,.json,.quiht.json,.zip,.quiht.zip" hidden>
    </div>

    <section id="control-bar" class="control-bar" hidden>
      <div class="result-bar">
        <div class="result-bar-left">
          <span id="result-meta" class="result-meta"></span>
          <nav id="ui-tabs" class="ui-tabs"></nav>
        </div>
        <button id="browse-btn" class="ghost-btn" type="button">Browse...</button>
      </div>
    </section>

    <div id="error" class="error" hidden></div>

    <section class="gallery-section" aria-label="Example bundles">
      <h2 class="gallery-title">Or load a synthetic example</h2>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <footer class="foot">
    <a href="https://github.com/fontlaborg/quiht">GitHub</a> ·
    <a href="https://www.npmjs.com/package/quiht-core">quiht-core on npm</a> ·
    Apache-2.0
  </footer>

</body>
</html>
