<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quiht — Qt .ui → HTML renderer</title>
  <meta name="description" content="Drag and drop a Qt .ui, .quiht.json, or .quiht.zip and see it rendered as HTML/CSS in your browser.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a84ff'/%3E%3Ctext x='16' y='22' font-family='Helvetica,Arial' font-size='16' font-weight='700' fill='white' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
  <script type="module" crossorigin src="./assets/index-Bo9E-JlB.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C_TuHrrN.css">
</head>
<body>
  <header class="hero">
    <div class="brand">
      <span class="brand-mark">QUIHT</span>
      <span class="brand-sub">Qt&nbsp;.ui&nbsp;→&nbsp;HTML renderer</span>
    </div>
    <button id="theme-toggle" class="ghost-btn" type="button" aria-label="Toggle theme">◐ Theme</button>
  </header>

  <main class="page">
    <p class="lede">
      Drop a Qt <code>.ui</code> file, a <code>.quiht.json</code> manifest, or an
      all-in-one <code>.quiht.zip</code> — and see it rendered, no Qt required.
    </p>

    <section id="dropzone" class="dropzone" tabindex="0" role="button"
             aria-label="Drop a file or click to browse">
      <div class="dropzone-inner">
        <div class="dropzone-icon">⤓</div>
        <p class="dropzone-title">Drop a file here</p>
        <p class="dropzone-hint">.ui · .quiht.json · .quiht.zip &nbsp;—&nbsp; or click to browse</p>
      </div>
      <input type="file" id="file-input" accept=".ui,.xml,.json,.quiht.json,.zip,.quiht.zip" hidden>
    </section>

    <section class="gallery-section" aria-label="Example bundles">
      <h2 class="gallery-title">Or load a real FontLab example</h2>
      <div id="gallery" class="gallery"></div>
    </section>

    <div id="error" class="error" hidden></div>

    <section id="result" class="result" hidden>
      <div class="result-bar">
        <span id="result-meta" class="result-meta"></span>
        <nav id="ui-tabs" class="ui-tabs"></nav>
      </div>
      <div id="stage" class="stage">
        <div id="render-root" class="render-root"></div>
      </div>
    </section>
  </main>

  <footer class="foot">
    <a href="https://github.com/fontlaborg/quiht">GitHub</a> ·
    <a href="https://www.npmjs.com/package/quiht-core">quiht-core on npm</a> ·
    Apache-2.0
  </footer>

</body>
</html>
